<emfular-basic-editor
  [svgwidth]="svgwidth"
  [svgheight]="svgheigth"
  [modelService]="modelService"
>
  <!-- Default sidebar -->
  <emfular-model-editing-bar
    sidebar
    [buttons]="sidebarButtons">
  </emfular-model-editing-bar>

  <!-- Default canvas content, needs svg namespace just like components -->
  <svg:g canvas>
    <g family
       [family]="modelService.model"
    (chosePerson)="choose($event)">
    </g>
  </svg:g>
</emfular-basic-editor>
