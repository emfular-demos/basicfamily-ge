<svg:g>
    <g [attr.transform]="'translate('+ (person.position.x) + ', ' + person.position.y +')'"
       (mousedown)="startDrag($event)"
       (mousemove)="drag($event)"
       (mouseup)="endDrag($event)"
       (click)="clickPerson()">
    <image
            [attr.href]="person.isWoman?'assets/Woman.gif':'assets/Man.gif'"
            x="0"
            y="0"
            width="32"
            height="32">
    </image>
    <text
            x="40"
            y="20"
            font-size="16"
            fill="black">
        {{person.name}}
    </text>
    </g>

    <g arrow-between-boxes *ngIf="person.father"
    [start]="person.position"
    [end]="person.father.position"
       style="stroke:#6699CC; stroke-width: 3px; marker-end: url(#POINTER);"
    >
    </g>
    <g arrow-between-boxes *ngIf="person.mother"
       [start]="person.position"
       [end]="person.mother.position"
       style="stroke:#CC66CC; stroke-width: 3px; marker-end: url(#POINTER);"
    >
    </g>
</svg:g>